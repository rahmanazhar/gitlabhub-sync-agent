# githublab-sync configuration — copy to githublab-sync.yaml and edit.
#
# Secrets are pulled from the environment with ${VAR} so this file is safe to
# commit (the real githublab-sync.yaml is git-ignored). Export GITHUB_TOKEN and
# GITLAB_TOKEN before running, or place them in a .env file.

github:
  owner: your-github-user-or-org   # e.g. "octocat" or "my-company"
  token: ${GITHUB_TOKEN}
  # host: github.com                # change for GitHub Enterprise
  # api_url: https://api.github.com

gitlab:
  owner: your-gitlab-group-or-user  # full namespace path, e.g. "my-group/sub"
  token: ${GITLAB_TOKEN}
  # host: gitlab.com                 # change for self-managed GitLab
  # api_url: https://gitlab.com/api/v4

sync:
  direction: bidirectional      # bidirectional | github-to-gitlab | gitlab-to-github
  create_missing: true          # create the repo on a provider when it is absent
  sync_branches: true
  sync_tags: true
  sync_pull_requests: true      # mirror open PRs <-> MRs (matched by source:target branch)
  strip_ai_attribution: true    # scrub AI co-author / "generated by" markers from PR/MR text
  default_visibility: private    # private | public | internal (for newly created mirrors)
  # cache_dir: ~/.cache/githublab-sync

# Each entry is one logical repository. Use a bare name when it matches on both
# sides, or specify github_name / gitlab_name when they differ.
repositories:
  - my-service
  - infra-tooling
  - name: website
    github_name: company-website
    gitlab_name: website-mirror
